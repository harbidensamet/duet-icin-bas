  :root{
    --asphalt:#0B0B0E;

  }

    align-items:center; justify-content:center;
    gap:0;

    position:absolute; inset:0;
    background-image:

      radial-gradient(circle at 80% 75%, rgba(255,255,255,0.02) 0, transparent 45%);
    pointer-events:none;
  }

    position:absolute;
    top:4.5%;
    left:50%;

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Düet İçin Bas — Geri Sayım</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#0B0B0E;
    --asphalt-2:#15151A;
    --magenta:#FF2D6F;
    --cyan:#2DE2FF;
    --paper:#F5F3EE;
    --flash:#FFD23F;
    --line: rgba(245,243,238,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--asphalt);
    color:var(--paper);
    font-family:'Space Grotesk', sans-serif;
    overflow:hidden;
  }
  #app{
    position:relative;
    width:100vw; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0;
  }
  #app::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 75%, rgba(255,255,255,0.02) 0, transparent 45%);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(16px,3.6vw,24px);
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--cyan);
    opacity:0.9;
    margin-bottom:70px;
    display:flex; align-items:center; gap:12px;
  }
  .eyebrow .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--magenta);
    box-shadow:0 0 8px 2px var(--magenta);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
  .round{
    display:none;
  }
  .digits{
    font-family:'Anton', sans-serif;
    font-size:clamp(90px, 30vw, 380px);
    line-height:0.82;
    letter-spacing:-0.02em;
    color:var(--paper);
    text-shadow:
      0 0 30px rgba(255,45,111,0.35),
      0 0 90px rgba(45,226,255,0.12);
    transition: transform 0.12s ease;
    user-select:none;
  }
  .digits.tick{ transform:scale(1.04); }
  .digits.low{ color:var(--magenta); text-shadow:0 0 40px rgba(255,45,111,0.6), 0 0 120px rgba(255,45,111,0.25);}
  .bas-screen{
    position:fixed; inset:0;
    background:var(--flash);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    z-index:50;
  }
  .bas-screen.show{
    opacity:1;
    animation:flashbg 1.1s ease-out forwards;
  }
  @keyframes flashbg{
    0%{ background:var(--flash); }
    100%{ background:var(--asphalt); }
  }
  .bas-text{
    text-align:center;
    transform: scale(0.6);
    animation: basPop 1.1s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  .bas-title{
    font-family:'Anton', sans-serif;
    font-size:clamp(46px, 9vw, 110px);
    color:var(--asphalt);
    letter-spacing:-0.01em;
    line-height:1.32;
  }
  .bas-sub{
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(13px, 2.2vw, 19px);
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--asphalt);
    opacity:0.75;
    margin-top:56px;
  }
  .bas-screen.show .bas-title,
  .bas-screen.show .bas-sub{ color:var(--paper); }
  @keyframes basPop{
    0%{ transform:scale(0.5); opacity:0; }
    35%{ transform:scale(1.08); opacity:1; }
    60%{ transform:scale(1); }
    100%{ transform:scale(1); }
  }
  .ring{
    position:absolute;
    border:3px solid var(--magenta);
    border-radius:50%;
    opacity:0;
  }
  .bas-screen.show .ring{
    animation: ringOut 1.1s ease-out forwards;
  }
  @keyframes ringOut{
    0%{ width:10px; height:10px; opacity:0.9; }
    100%{ width:140vmax; height:140vmax; opacity:0; }
  }
  .firework-layer{
    position:absolute; inset:0;
    overflow:hidden;
    pointer-events:none;
  }
  .spark{
    position:absolute;
    width:9px; height:9px;
    border-radius:50%;
    left:0; top:0;
    animation:sparkFly 900ms ease-out forwards;
  }
  @keyframes sparkFly{
    0%{ transform:translate(-50%,-50%) translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(-50%,-50%) translate(var(--dx), var(--dy)) scale(0.25); opacity:0; }
  }
  .brandmark{
    position:fixed; bottom:26px; left:0; right:0;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(10px,1.8vw,13px);
    letter-spacing:0.22em;
    color:var(--paper);
    opacity:0.3;
  }
  #host{
    position:fixed; inset:0;
    background:var(--asphalt);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:26px;
    padding:24px;
    z-index:60;
  }
  #host.active{ display:flex; }
